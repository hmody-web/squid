name: test_webview_local
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/web/img2/ico1.png"

flutter:
  uses-material-design: true

  assets:
    - assets/web/
    - assets/web/img2/
    - assets/web/fonts/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/web/fonts/Tajawal.ttf
          weight: 500